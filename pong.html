<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>S + H Pong</title>
  <style>
    @font-face {
      font-family: 'Elma Mono';
      src: url('fonts/Elma-Mono-Regular-Demo.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fce3e3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Elma Mono', monospace;
      color: #6b2f1a;
      overflow: hidden;
      touch-action: none;
    }
    h1 {
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      opacity: 0.6;
    }
    .play-to {
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.35;
      margin-bottom: 1rem;
    }
    canvas {
      border: 2px solid #c9a96e;
      border-radius: 4px;
      display: block;
    }
    .dink-counter {
      display: flex;
      gap: 0.5rem;
      align-items: baseline;
      margin-bottom: 1rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .dink-counter span {
      color: #dd1000;
      font-size: 1.8rem;
      display: block;
      text-align: center;
    }
    .instructions {
      margin-top: 0.8rem;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.4;
    }
    a.back {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      color: #c9a96e;
      text-decoration: none;
      font-family: 'Elma Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      z-index: 50;
    }
    a.back:hover { opacity: 0.7; }

    /* Game over overlay */
    .game-over-overlay {
      position: fixed;
      inset: 0;
      background: rgba(252, 227, 227, 0.97);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.4s ease-out;
      padding: 2rem;
      overflow-y: auto;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .game-over-overlay .womp {
      font-size: 0.6rem;
      color: #c9a96e;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .game-over-overlay .dink-big {
      font-size: 5rem;
      color: #dd1000;
      line-height: 1;
      margin-bottom: 0.2rem;
    }
    .game-over-overlay .dink-result {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 2rem;
    }
    .game-over-overlay .game-over-msg {
      font-size: 0.65rem;
      color: #6b2f1a;
      letter-spacing: 0.08em;
      text-align: center;
      line-height: 1.8;
      max-width: 320px;
      opacity: 0.5;
      margin-bottom: 2rem;
    }

    /* Name input */
    .name-entry {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      align-items: center;
    }
    .name-entry input {
      font-family: 'Elma Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      padding: 0.6rem 1rem;
      border: 2px solid #c9a96e;
      border-radius: 4px;
      background: transparent;
      color: #6b2f1a;
      width: 140px;
      outline: none;
    }
    .name-entry input::placeholder { color: #c9a96e; opacity: 0.6; }
    .name-entry input:focus { border-color: #dd1000; }
    .name-entry button {
      font-family: 'Elma Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fce3e3;
      background: #dd1000;
      border: none;
      padding: 0.65rem 1rem;
      border-radius: 4px;
      cursor: pointer;
    }
    .name-entry button:hover { opacity: 0.85; }
    .name-saved {
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #c9a96e;
      margin-bottom: 1.5rem;
    }

    /* Leaderboard */
    .leaderboard {
      width: 100%;
      max-width: 300px;
      margin-bottom: 1.5rem;
    }
    .leaderboard h3 {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 0.8rem;
      text-align: center;
    }
    .lb-entry {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.4rem 0;
      border-bottom: 1px solid rgba(201, 169, 110, 0.2);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
    }
    .lb-entry .lb-rank {
      color: #c9a96e;
      width: 1.5rem;
      text-align: center;
    }
    .lb-entry .lb-name {
      flex: 1;
      margin-left: 0.5rem;
    }
    .lb-entry .lb-dinks {
      color: #dd1000;
      font-weight: bold;
    }
    .lb-entry.lb-you {
      color: #dd1000;
    }

    .play-again-btn {
      font-family: 'Elma Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fce3e3;
      background: #dd1000;
      border: none;
      padding: 1rem 2.5rem;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .play-again-btn:hover { opacity: 0.85; }

    @media (max-width: 768px) {
      h1 { font-size: 0.7rem; margin-bottom: 0.3rem; }
      .play-to { margin-bottom: 0.5rem; }
      .dink-counter { margin-bottom: 0.5rem; font-size: 0.55rem; }
      .dink-counter span { font-size: 1.4rem; }
      .instructions { font-size: 0.5rem; }
      .game-over-overlay .womp { font-size: 0.55rem; }
      .game-over-overlay .dink-big { font-size: 4rem; }
      .game-over-overlay .game-over-msg { font-size: 0.6rem; }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back">&larr; Back</a>
  <h1>SallyAI vs You</h1>
  <p class="play-to">How long can you last?</p>
  <div class="dink-counter">
    <div>Dinks<span id="dinkCount">0</span></div>
  </div>
  <canvas id="pong"></canvas>
  <p class="instructions" id="instructions"></p>
  <div class="game-over-overlay" id="gameOverOverlay" style="display:none"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script>
    // Firebase setup
    const firebaseConfig = {
      apiKey: "AIzaSyAsjvumG1oXcwuADHGvoGdPypzhHX4Zxsc",
      authDomain: "halsal.firebaseapp.com",
      databaseURL: "https://halsal-default-rtdb.firebaseio.com",
      projectId: "halsal",
      storageBucket: "halsal.firebasestorage.app",
      messagingSenderId: "614593974910",
      appId: "1:614593974910:web:68f69c1c4afb18556ebe2f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const canvas = document.getElementById('pong');
    const ctx = canvas.getContext('2d');
    const isMobile = window.innerWidth <= 768;

    const dpr = window.devicePixelRatio || 1;
    let W, H;

    if (isMobile) {
      W = Math.min(window.innerWidth - 20, 360);
      H = Math.min(window.innerHeight - 220, 500);
    } else {
      W = 900;
      H = 550;
    }

    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);

    const PADDLE_THICK = isMobile ? 12 : 30;
    const PADDLE_LEN = isMobile ? 70 : 70;
    const BALL_R = isMobile ? 10 : 12;
    const MARGIN = isMobile ? 15 : 20;

    const paddleImg = new Image();
    paddleImg.src = 'images/paddle.svg';
    const ballImg = new Image();
    ballImg.src = 'images/ball.svg';

    document.getElementById('instructions').innerHTML = isMobile
      ? 'drag to move paddle'
      : 'move mouse or &uarr; / &darr;';

    const SEC = isMobile ? W : H;
    const PRI = isMobile ? H : W;

    const state = {
      ball: { x: W / 2, y: H / 2, vx: 0, vy: 0 },
      p1: { pos: SEC / 2 },
      p2: { pos: SEC / 2 },
      running: false,
      gameOver: false
    };

    const keys = {};
    let countdown = 0;
    let countdownTimer = null;
    let waitingForStart = true;

    let baseSpeed = isMobile ? 5 : 6;
    let speedMultiplier = 1;
    let dinks = 0;          // player returns (the stat that matters)
    let totalRallies = 0;   // all paddle hits (used for speed increase)

    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === ' ' && waitingForStart && !state.running && !state.gameOver) {
        startCountdown();
      }
    });
    document.addEventListener('keyup', e => keys[e.key] = false);

    // Mouse control (desktop)
    if (!isMobile) {
      canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        const mouseY = e.clientY - rect.top;
        state.p2.pos = Math.max(PADDLE_LEN / 2, Math.min(H - PADDLE_LEN / 2, mouseY));
      });
    }

    let touchX = null;
    if (isMobile) {
      canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        if (waitingForStart && !state.running && !state.gameOver) {
          startCountdown(); return;
        }
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        touchX = touch.clientX - rect.left;
        state.p2.pos = touchX;
      });
      canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        touchX = touch.clientX - rect.left;
        state.p2.pos = Math.max(PADDLE_LEN / 2, Math.min(W - PADDLE_LEN / 2, touchX));
      });
      canvas.addEventListener('touchend', () => { touchX = null; });
    }

    function updateDinkDisplay() {
      document.getElementById('dinkCount').textContent = dinks;
    }

    function startCountdown() {
      waitingForStart = false;
      countdown = 3;
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
          clearInterval(countdownTimer);
          countdownTimer = null;
          serve();
        }
      }, 700);
    }

    function serve() {
      state.running = true;
      countdown = 0;
      speedMultiplier = 1;
      totalRallies = 0;
      dinks = 0;
      updateDinkDisplay();
      const angle = (Math.random() - 0.5) * Math.PI / 3;

      if (isMobile) {
        // Always serve toward player (downward)
        state.ball.vy = baseSpeed * Math.cos(angle);
        state.ball.vx = baseSpeed * Math.sin(angle);
      } else {
        // Always serve toward player (rightward)
        state.ball.vx = baseSpeed * Math.cos(angle);
        state.ball.vy = baseSpeed * Math.sin(angle);
      }
    }

    function resetForNewGame() {
      state.ball.x = W / 2;
      state.ball.y = H / 2;
      state.ball.vx = 0;
      state.ball.vy = 0;
      state.p1.pos = SEC / 2;
      state.p2.pos = SEC / 2;
      state.running = false;
      state.gameOver = false;
      dinks = 0;
      totalRallies = 0;
      speedMultiplier = 1;
      waitingForStart = true;
      updateDinkDisplay();
    }

    function update() {
      const pSpeed = 5;

      if (isMobile) {
        // SallyAI (top paddle) — unbeatable: tracks ball perfectly with slight smoothing
        if (state.running) {
          const sallyCenter = state.p1.pos;
          // She always gets there — high base speed, scales with rallies
          const aiSpeed = 6 + (totalRallies * 0.3);
          if (state.ball.vy < 0) {
            const timeToReach = Math.abs((MARGIN + PADDLE_THICK - state.ball.y) / (state.ball.vy || 1));
            let predictedX = state.ball.x + state.ball.vx * timeToReach;
            while (predictedX < 0 || predictedX > W) {
              if (predictedX < 0) predictedX = -predictedX;
              if (predictedX > W) predictedX = 2 * W - predictedX;
            }
            if (sallyCenter < predictedX - 2) state.p1.pos += Math.min(aiSpeed, predictedX - sallyCenter);
            if (sallyCenter > predictedX + 2) state.p1.pos -= Math.min(aiSpeed, sallyCenter - predictedX);
          } else {
            // Return to center smoothly
            const center = W / 2;
            if (sallyCenter < center - 5) state.p1.pos += 3;
            if (sallyCenter > center + 5) state.p1.pos -= 3;
          }
          state.p1.pos = Math.max(PADDLE_LEN / 2, Math.min(W - PADDLE_LEN / 2, state.p1.pos));
        }

        if (!state.running) return;

        const b = state.ball;
        b.x += b.vx;
        b.y += b.vy;

        // Left/right bounce
        if (b.x - BALL_R <= 0 || b.x + BALL_R >= W) {
          b.vx *= -1;
          b.x = b.x - BALL_R <= 0 ? BALL_R : W - BALL_R;
        }

        // Top paddle collision (Sally) — she always returns it
        if (b.y - BALL_R <= MARGIN + PADDLE_THICK && b.x >= state.p1.pos - PADDLE_LEN / 2 && b.x <= state.p1.pos + PADDLE_LEN / 2 && b.vy < 0) {
          totalRallies++;
          speedMultiplier = 1 + totalRallies * 0.06;
          b.vy = Math.abs(b.vy) * Math.min(speedMultiplier, 2.2);
          b.vy = Math.min(b.vy, 10);
          const hit = (b.x - state.p1.pos) / (PADDLE_LEN / 2);
          b.vx = hit * 2.5 * speedMultiplier;
          b.y = MARGIN + PADDLE_THICK + BALL_R;
        }

        // Bottom paddle collision (Player)
        if (b.y + BALL_R >= H - MARGIN - PADDLE_THICK && b.x >= state.p2.pos - PADDLE_LEN / 2 && b.x <= state.p2.pos + PADDLE_LEN / 2 && b.vy > 0) {
          dinks++;
          totalRallies++;
          updateDinkDisplay();
          speedMultiplier = 1 + totalRallies * 0.06;
          b.vy = -Math.abs(b.vy) * Math.min(speedMultiplier, 2.2);
          b.vy = -Math.min(Math.abs(b.vy), 10);
          const hit = (b.x - state.p2.pos) / (PADDLE_LEN / 2);
          b.vx = hit * 2.5 * speedMultiplier;
          b.y = H - MARGIN - PADDLE_THICK - BALL_R;
        }

        // Player missed — ball goes past bottom
        if (b.y > H) {
          state.running = false;
          state.gameOver = true;
          showGameOver();
        }
        // Ball goes past top (shouldn't happen, but just in case — Sally "saves" it)
        if (b.y < 0) {
          b.vy = Math.abs(b.vy);
          b.y = BALL_R;
        }

      } else {
        // --- DESKTOP ---
        if (keys['ArrowUp']) state.p2.pos = Math.max(PADDLE_LEN / 2, state.p2.pos - pSpeed);
        if (keys['ArrowDown']) state.p2.pos = Math.min(H - PADDLE_LEN / 2, state.p2.pos + pSpeed);

        // SallyAI — unbeatable
        if (state.running) {
          const sallyCenter = state.p1.pos;
          const aiSpeed = 6 + (totalRallies * 0.3);
          if (state.ball.vx < 0) {
            const timeToReach = Math.abs((MARGIN + PADDLE_THICK - state.ball.x) / (state.ball.vx || 1));
            let predictedY = state.ball.y + state.ball.vy * timeToReach;
            while (predictedY < 0 || predictedY > H) {
              if (predictedY < 0) predictedY = -predictedY;
              if (predictedY > H) predictedY = 2 * H - predictedY;
            }
            if (sallyCenter < predictedY - 2) state.p1.pos += Math.min(aiSpeed, predictedY - sallyCenter);
            if (sallyCenter > predictedY + 2) state.p1.pos -= Math.min(aiSpeed, sallyCenter - predictedY);
          } else {
            const center = H / 2;
            if (sallyCenter < center - 5) state.p1.pos += 3;
            if (sallyCenter > center + 5) state.p1.pos -= 3;
          }
          state.p1.pos = Math.max(PADDLE_LEN / 2, Math.min(H - PADDLE_LEN / 2, state.p1.pos));
        }

        if (!state.running) return;

        const b = state.ball;
        b.x += b.vx;
        b.y += b.vy;

        // Top/bottom bounce
        if (b.y - BALL_R <= 0 || b.y + BALL_R >= H) {
          b.vy *= -1;
          b.y = b.y - BALL_R <= 0 ? BALL_R : H - BALL_R;
        }

        // Left paddle (Sally) — always returns
        if (b.x - BALL_R <= MARGIN + PADDLE_THICK && b.y >= state.p1.pos - PADDLE_LEN / 2 && b.y <= state.p1.pos + PADDLE_LEN / 2 && b.vx < 0) {
          totalRallies++;
          speedMultiplier = 1 + totalRallies * 0.06;
          b.vx = Math.abs(b.vx) * Math.min(speedMultiplier, 2.2);
          b.vx = Math.min(b.vx, 12);
          const hit = (b.y - state.p1.pos) / (PADDLE_LEN / 2);
          b.vy = hit * 2.5 * speedMultiplier;
          b.x = MARGIN + PADDLE_THICK + BALL_R;
        }

        // Right paddle (Player)
        if (b.x + BALL_R >= W - MARGIN - PADDLE_THICK && b.y >= state.p2.pos - PADDLE_LEN / 2 && b.y <= state.p2.pos + PADDLE_LEN / 2 && b.vx > 0) {
          dinks++;
          totalRallies++;
          updateDinkDisplay();
          speedMultiplier = 1 + totalRallies * 0.06;
          b.vx = -Math.abs(b.vx) * Math.min(speedMultiplier, 2.2);
          b.vx = -Math.min(Math.abs(b.vx), 12);
          const hit = (b.y - state.p2.pos) / (PADDLE_LEN / 2);
          b.vy = hit * 2.5 * speedMultiplier;
          b.x = W - MARGIN - PADDLE_THICK - BALL_R;
        }

        // Player missed
        if (b.x > W) {
          state.running = false;
          state.gameOver = true;
          showGameOver();
        }
        // Ball past left (shouldn't happen)
        if (b.x < 0) {
          b.vx = Math.abs(b.vx);
          b.x = BALL_R;
        }
      }
    }

    function draw() {
      ctx.fillStyle = '#fce3e3';
      ctx.fillRect(0, 0, W, H);

      // --- Pickleball court lines ---
      const lineColor = 'rgba(201, 169, 110, 0.3)';
      const kitchenColor = 'rgba(201, 169, 110, 0.25)';
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 1;

      if (isMobile) {
        // Center line (net)
        ctx.setLineDash([6, 8]);
        ctx.beginPath();
        ctx.moveTo(0, H / 2);
        ctx.lineTo(W, H / 2);
        ctx.stroke();

        // Kitchen / NVZ lines (solid, ~22% from center each side)
        const kitchenDist = H * 0.15;
        ctx.setLineDash([]);
        ctx.strokeStyle = kitchenColor;
        ctx.beginPath();
        ctx.moveTo(0, H / 2 - kitchenDist);
        ctx.lineTo(W, H / 2 - kitchenDist);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, H / 2 + kitchenDist);
        ctx.lineTo(W, H / 2 + kitchenDist);
        ctx.stroke();

        // Center service line (vertical, from kitchen to baseline)
        ctx.setLineDash([6, 8]);
        ctx.strokeStyle = lineColor;
        ctx.beginPath();
        ctx.moveTo(W / 2, 0);
        ctx.lineTo(W / 2, H / 2 - kitchenDist);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(W / 2, H / 2 + kitchenDist);
        ctx.lineTo(W / 2, H);
        ctx.stroke();
      } else {
        // Center line (net)
        ctx.setLineDash([6, 8]);
        ctx.beginPath();
        ctx.moveTo(W / 2, 0);
        ctx.lineTo(W / 2, H);
        ctx.stroke();

        // Kitchen / NVZ lines (solid)
        const kitchenDist = W * 0.15;
        ctx.setLineDash([]);
        ctx.strokeStyle = kitchenColor;
        ctx.beginPath();
        ctx.moveTo(W / 2 - kitchenDist, 0);
        ctx.lineTo(W / 2 - kitchenDist, H);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(W / 2 + kitchenDist, 0);
        ctx.lineTo(W / 2 + kitchenDist, H);
        ctx.stroke();

        // Center service line (horizontal, from kitchen to baseline)
        ctx.setLineDash([6, 8]);
        ctx.strokeStyle = lineColor;
        ctx.beginPath();
        ctx.moveTo(0, H / 2);
        ctx.lineTo(W / 2 - kitchenDist, H / 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(W / 2 + kitchenDist, H / 2);
        ctx.lineTo(W, H / 2);
        ctx.stroke();
      }
      ctx.setLineDash([]);

      // Draw dink count on canvas
      ctx.fillStyle = 'rgba(201, 169, 110, 0.15)';
      ctx.font = (isMobile ? '80' : '120') + 'px "Elma Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(dinks, W / 2, H / 2 + (isMobile ? 30 : 40));

      // Paddles — simple bars on both mobile and desktop
      ctx.fillStyle = '#c9a96e';
      if (isMobile) {
        const p1x = state.p1.pos - PADDLE_LEN / 2;
        ctx.beginPath();
        ctx.rect(p1x, MARGIN, PADDLE_LEN, PADDLE_THICK);
        ctx.fill();
        const p2x = state.p2.pos - PADDLE_LEN / 2;
        ctx.beginPath();
        ctx.rect(p2x, H - MARGIN - PADDLE_THICK, PADDLE_LEN, PADDLE_THICK);
        ctx.fill();
      } else {
        ctx.fillRect(MARGIN, state.p1.pos - PADDLE_LEN / 2, PADDLE_THICK, PADDLE_LEN);
        ctx.fillRect(W - MARGIN - PADDLE_THICK, state.p2.pos - PADDLE_LEN / 2, PADDLE_THICK, PADDLE_LEN);
      }

      // Ball
      if (ballImg.complete) {
        const ballSize = BALL_R * 2.5;
        ctx.drawImage(ballImg, state.ball.x - ballSize / 2, state.ball.y - ballSize / 2, ballSize, ballSize);
      } else {
        ctx.fillStyle = '#dd1000';
        ctx.beginPath();
        ctx.arc(state.ball.x, state.ball.y, BALL_R, 0, Math.PI * 2);
        ctx.fill();
      }

      // Countdown overlay
      if (countdown > 0) {
        ctx.fillStyle = 'rgba(252, 227, 227, 0.85)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#dd1000';
        ctx.font = (isMobile ? '52' : '72') + 'px "Elma Mono", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(countdown, W / 2, H / 2 + 15);
      }

      // Start prompt
      if (waitingForStart && !state.running && !state.gameOver) {
        ctx.fillStyle = 'rgba(252, 227, 227, 0.9)';
        ctx.fillRect(0, 0, W, H);
        ctx.textAlign = 'center';

        ctx.fillStyle = '#dd1000';
        ctx.font = (isMobile ? '18' : '28') + 'px "Elma Mono", monospace';
        ctx.fillText(isMobile ? 'TAP TO PLAY' : 'PRESS SPACE TO PLAY', W / 2, H / 2 - 10);

        ctx.fillStyle = '#6b2f1a';
        ctx.globalAlpha = 0.35;
        ctx.font = (isMobile ? '9' : '11') + 'px "Elma Mono", monospace';
        ctx.fillText(isMobile ? 'drag to move your paddle' : 'move mouse or use arrow keys', W / 2, H / 2 + 20);
        ctx.globalAlpha = 1;
      }
    }

    // --- Leaderboard ---
    function saveScore(name, dinkCount) {
      const entry = { name: name.substring(0, 15), dinks: dinkCount, ts: Date.now() };
      db.ref('pong-leaderboard').push(entry);
    }

    function renderLeaderboard(container, highlightDinks) {
      db.ref('pong-leaderboard').orderByChild('dinks').limitToLast(10).once('value', snap => {
        const entries = [];
        snap.forEach(child => entries.push(child.val()));
        entries.sort((a, b) => b.dinks - a.dinks);

        if (entries.length === 0) {
          container.innerHTML = '<p style="font-size:0.55rem;opacity:0.4;text-align:center">No scores yet. Be the first!</p>';
          return;
        }

        container.innerHTML = entries.map((e, i) => {
          const isYou = (e.dinks === highlightDinks && !entries.slice(0, i).some(prev => prev.dinks === highlightDinks && prev.highlighted));
          e.highlighted = isYou;
          return `<div class="lb-entry${isYou ? ' lb-you' : ''}">
            <span class="lb-rank">${i + 1}</span>
            <span class="lb-name">${e.name}</span>
            <span class="lb-dinks">${e.dinks} dinks</span>
          </div>`;
        }).join('');
      });
    }

    function showGameOver() {
      const overlay = document.getElementById('gameOverOverlay');
      const msgs = [
        "Sally's pretty good at pickleball.<br>What made you think pong would be different?",
        "You didn't actually think you could beat her, right?",
        "SallyAI doesn't lose. She just lets you rally for a bit.",
        "That was cute. She wasn't even trying.",
        "Honestly? Respectable effort. But no."
      ];
      const msg = msgs[Math.floor(Math.random() * msgs.length)];

      overlay.innerHTML = `
        <p class="womp">womp womp</p>
        <p class="dink-big">${dinks}</p>
        <p class="dink-result">dink${dinks !== 1 ? 's' : ''}</p>
        <p class="game-over-msg">${msg}</p>
        <div class="name-entry" id="nameEntry">
          <input type="text" id="nameInput" placeholder="Your name" maxlength="15" autocomplete="off">
          <button id="saveBtn">Save</button>
        </div>
        <div class="leaderboard">
          <h3>Leaderboard</h3>
          <div id="lbEntries"></div>
        </div>
        <button class="play-again-btn" id="rematchBtn">Try again</button>
      `;

      overlay.style.display = 'flex';

      renderLeaderboard(document.getElementById('lbEntries'), null);

      document.getElementById('saveBtn').addEventListener('click', () => {
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return;
        saveScore(name, dinks);
        document.getElementById('nameEntry').innerHTML = '<p class="name-saved">Saved!</p>';
        setTimeout(() => renderLeaderboard(document.getElementById('lbEntries'), dinks), 500);
      });

      document.getElementById('nameInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('saveBtn').click();
      });

      document.getElementById('rematchBtn').addEventListener('click', () => {
        overlay.style.display = 'none';
        resetForNewGame();
      });
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
